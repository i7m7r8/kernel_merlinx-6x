name: Build MerlinX 6.12 Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Kernel 6.12-merlinx
    runs-on: ubuntu-24.04
    steps:
      - name: Download Linux 6.12 from Git
        run: |
          echo "=== Cloning Linux 6.12 ==="
          git clone --depth=1 --branch v6.12 https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git kernel
          echo "=== Linux 6.12 source ready ==="
          ls kernel/ | head -10

      - name: Checkout Our Patches
        uses: actions/checkout@v4
        with:
          path: patches

      - name: Apply MT6768/MT6769 Patches
        run: |
          echo "=== Applying merlinx patches to Linux 6.12 ==="
          cp patches/include/dt-bindings/clock/mt6769-clk.h kernel/include/dt-bindings/clock/
          cp patches/drivers/clk/mediatek/clk-mt6769-*.c kernel/drivers/clk/mediatek/
          echo "obj-\$(CONFIG_COMMON_CLK_MT6769_TOPCKGEN) += clk-mt6769-topckgen.o" >> kernel/drivers/clk/mediatek/Makefile
          echo "obj-\$(CONFIG_COMMON_CLK_MT6769_APMIXED) += clk-mt6769-apmixed.o" >> kernel/drivers/clk/mediatek/Makefile
          echo "obj-\$(CONFIG_COMMON_CLK_MT6769_INFRA) += clk-mt6769-infracfg.o" >> kernel/drivers/clk/mediatek/Makefile
          cp patches/drivers/pinctrl/mediatek/pinctrl-mt6768.c kernel/drivers/pinctrl/mediatek/
          echo "obj-\$(CONFIG_PINCTRL_MT6768) += pinctrl-mt6768.o" >> kernel/drivers/pinctrl/mediatek/Makefile
          cp patches/arch/arm64/boot/dts/mediatek/mt6768.dtsi kernel/arch/arm64/boot/dts/mediatek/
          cp patches/arch/arm64/boot/dts/mediatek/mt6769-xiaomi-merlinx.dts kernel/arch/arm64/boot/dts/mediatek/
          echo "dtb-\$(CONFIG_ARCH_MEDIATEK) += mt6769-xiaomi-merlinx.dtb" >> kernel/arch/arm64/boot/dts/mediatek/Makefile
          cp patches/arch/arm64/configs/merlin_defconfig kernel/arch/arm64/configs/
          echo "=== Patches applied ==="

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu bison flex libssl-dev libelf-dev bc lzop libncurses5-dev libncurses-dev make zip ccache
          ccache -o max_size=3G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-merlinx-6.12
          restore-keys: ${{ runner.os }}-ccache-merlinx-

      - name: Configure Kernel
        run: |
          cd kernel
          make mrproper
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- merlin_defconfig
          echo "=== Key configs ==="
          grep -c "=y\|=m" out/.config || true

      - name: Build Kernel
        id: build
        run: |
          cd kernel
          echo "=== Building MerlinX Kernel 6.12 ==="
          export CCACHE_DIR=$HOME/.ccache
          START=$(date +%s)
          make -j$(nproc) O=out ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache aarch64-linux-gnu-gcc" Image modules dtbs
          END=$(date +%s)
          echo "build_time=$((END - START))s" >> $GITHUB_OUTPUT
          echo "=== Build Complete in $((END - START)) seconds ==="

      - name: Package Kernel
        if: success()
        run: |
          cd kernel
          mkdir -p output
          if [ -f out/arch/arm64/boot/Image.gz ]; then
            cp out/arch/arm64/boot/Image.gz output/
          elif [ -f out/arch/arm64/boot/Image ]; then
            cp out/arch/arm64/boot/Image output/
          fi
          find out/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/ \; 2>/dev/null
          cd output && zip -r ../MerlinX-Kernel-6.12.zip . && cd ..
          ls -lh MerlinX-Kernel-6.12.zip

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MerlinX-Kernel-6.12
          path: kernel/MerlinX-Kernel-6.12.zip
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "## Build Success" >> $GITHUB_STEP_SUMMARY
            echo "- Kernel: Linux 6.12 (Mainline + MT6768 drivers)" >> $GITHUB_STEP_SUMMARY
            echo "- Device: Redmi Note 9 (merlinx)" >> $GITHUB_STEP_SUMMARY
            echo "- Build Time: ${{ steps.build.outputs.build_time }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Download from **Artifacts** section." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
