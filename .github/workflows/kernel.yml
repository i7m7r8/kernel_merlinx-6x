name: Build MerlinX 6.12 Kernel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Kernel 6.12-merlinx
    runs-on: ubuntu-24.04
    steps:
      - name: Download Linux 6.12
        run: |
          git clone --depth=1 --branch v6.12 https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git kernel

      - name: Checkout Patches
        uses: actions/checkout@v4
        with:
          path: patches

      - name: Clean Kernel Source
        run: |
          cd kernel
          git clean -fdx
          git checkout -- .
          rm -rf out/ include/config/ .config

      - name: Apply Patches
        run: |
          cp patches/include/dt-bindings/clock/mt6769-clk.h kernel/include/dt-bindings/clock/
          cp patches/drivers/clk/mediatek/clk-mt6769-*.c kernel/drivers/clk/mediatek/
          for f in clk-mt6769-topckgen clk-mt6769-apmixed clk-mt6769-infracfg; do
            echo "obj-\$(CONFIG_COMMON_CLK_MT6769_$(echo $f | cut -d- -f3 | tr 'a-z' 'A-Z')) += $f.o" >> kernel/drivers/clk/mediatek/Makefile
          done
          cp patches/drivers/pinctrl/mediatek/pinctrl-mt6768.c kernel/drivers/pinctrl/mediatek/
          echo 'obj-$(CONFIG_PINCTRL_MT6768) += pinctrl-mt6768.o' >> kernel/drivers/pinctrl/mediatek/Makefile
          # Apply mt6358-regulator NULL pointer fix
          python3 -c "import sys; path='kernel/drivers/regulator/mt6358-regulator.c'; f=open(path); c=f.read(); f.close(); old='\tint i, max_regulator, ret;\n\n\tswitch (mt6397->chip_id)'; new='\tint i, max_regulator, ret;\n\n\tif (!mt6397) {\n\t\tdev_err(\&pdev->dev, \"no MFD parent data - deferring probe\\n\");\n\t\treturn -EPROBE_DEFER;\n\t}\n\n\tswitch (mt6397->chip_id)'; c=c.replace(old, new); f=open(path,'w'); f.write(c); f.close(); print('SUCCESS: mt6358 NULL check applied')"
          cp patches/arch/arm64/boot/dts/mediatek/mt6768.dtsi kernel/arch/arm64/boot/dts/mediatek/
          cp patches/arch/arm64/boot/dts/mediatek/mt6769-xiaomi-merlinx.dts kernel/arch/arm64/boot/dts/mediatek/
          echo 'dtb-$(CONFIG_ARCH_MEDIATEK) += mt6769-xiaomi-merlinx.dtb' >> kernel/arch/arm64/boot/dts/mediatek/Makefile
          cp patches/arch/arm64/configs/merlin_defconfig kernel/arch/arm64/configs/

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm gcc-aarch64-linux-gnu g++-aarch64-linux-gnu bison flex libssl-dev libelf-dev bc lzop libncurses5-dev libncurses-dev make zip ccache wget patch
          ccache -o max_size=3G

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-merlinx-6.12
          restore-keys: ${{ runner.os }}-ccache-merlinx-

      - name: Configure
        run: |
          cd kernel
          make O=../build ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- merlin_defconfig
          echo "Config options: $(grep -c '=y\|=m' ../build/.config)"

      - name: Build Kernel
        id: build
        run: |
          cd kernel
          export CCACHE_DIR=$HOME/.ccache
          START=$(date +%s)
          make LLVM=1 O=../build ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" -j$(nproc) Image dtbs
          END=$(date +%s)
          echo "build_time=$((END - START))s" >> $GITHUB_OUTPUT
          echo "Build done in $((END - START))s"

      - name: Package Firmware
        if: success()
        run: |
          echo "=== Packaging firmware ==="
          mkdir -p firmware/mediatek
          cp patches/firmware/novatek_ts_fw.bin firmware/
          cp patches/firmware/novatek_ts_mp.bin firmware/
          cp patches/firmware/soc1_0_ram_wifi_1a_1_hdr.bin firmware/mediatek/
          cp patches/firmware/soc1_0_ram_bt_1a_1_hdr.bin firmware/mediatek/
          cp patches/firmware/soc1_0_patch_mcu_1a_1_hdr.bin firmware/mediatek/
          ls -lhR firmware/

      - name: Upload Firmware Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MerlinX-Firmware
          path: firmware/
          retention-days: 30

      - name: Package AnyKernel3
        if: success()
        run: |
          mkdir -p AK3
          cd AK3

          # Use bundled working AnyKernel3 tools (latest AK3 magiskboot breaks on MTK boot images)
          cp -r ../patches/anykernel3-tools/META-INF .
          cp -r ../patches/anykernel3-tools/tools .
          cp -r ../patches/anykernel3-tools/ramdisk .
          cp ../patches/anykernel3-tools/LICENSE .

          # Create placeholder directories
          mkdir -p modules/system/lib/modules
          mkdir -p patch
          touch modules/system/lib/modules/placeholder
          touch patch/placeholder

          # Build Image.gz-dtb (required for MTK boot - must be gzipped with DTB appended)
          if [ -f ../build/arch/arm64/boot/Image ]; then
            DTB=../build/arch/arm64/boot/dts/mediatek/mt6769-xiaomi-merlinx.dtb
            gzip -c ../build/arch/arm64/boot/Image > Image.gz
            if [ -f "$DTB" ]; then
              cat Image.gz "$DTB" > Image.gz-dtb
              rm Image.gz
              echo "Created Image.gz-dtb (gzipped kernel + appended DTB)"
            else
              mv Image.gz Image.gz-dtb
              echo "Created Image.gz-dtb (gzipped kernel, no DTB found)"
            fi
          elif [ -f ../build/arch/arm64/boot/Image.gz ]; then
            DTB=../build/arch/arm64/boot/dts/mediatek/mt6769-xiaomi-merlinx.dtb
            if [ -f "$DTB" ]; then
              cat ../build/arch/arm64/boot/Image.gz "$DTB" > Image.gz-dtb
              echo "Created Image.gz-dtb from existing Image.gz + DTB"
            else
              cp ../build/arch/arm64/boot/Image.gz Image.gz-dtb
              echo "Created Image.gz-dtb (copied Image.gz)"
            fi
          else
            echo "No kernel image found!"
            exit 1
          fi
          ls -lh Image.gz-dtb

          # Write proper anykernel.sh - uses dump_boot/write_boot which works with this AK3 version
          cat > anykernel.sh << 'AK3EOF'
          ### AnyKernel3 Ramdisk Mod Script
          ## osm0sis @ xda-developers

          ### AnyKernel setup
          # begin properties
          properties() { '
          kernel.string=MerlinX-Kernel-6.12
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=merlin
          supported.versions=
          supported.patchlevels=
          '; } # end properties

          ### AnyKernel install
          # begin attributes
          attributes() {
          	set_perm_recursive 0 0 755 644 $ramdisk/*;
          	set_perm_recursive 0 0 750 750 $ramdisk/init* $ramdisk/sbin;
          } # end attributes


          ## boot shell variables
          block=/dev/block/by-name/boot;
          is_slot_device=0;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          override_dtbo=0;

          # import functions/variables and setup patching - see for reference (DO NOT REMOVE)
          . tools/ak3-core.sh && attributes;

          # boot install
          dump_boot; # use split_boot to skip ramdisk unpack, e.g. for devices with init_boot ramdisk

          write_boot; # use flash_boot to skip ramdisk repack, e.g. for devices with init_boot ramdisk
          ## end boot install
          AK3EOF

          # Fix any leading whitespace in anykernel.sh (TWRP parser is strict)
          sed -i 's/^[[:space:]]*//g' anykernel.sh

          cat anykernel.sh

          # Create zip (include hidden files in META-INF)
          zip -r9 ../MerlinX-Kernel-6.12.zip * .[!.]* META-INF/.* 2>/dev/null || zip -r9 ../MerlinX-Kernel-6.12.zip *
          cd ..
          ls -lh MerlinX-Kernel-6.12.zip
          unzip -l MerlinX-Kernel-6.12.zip

      - name: Upload Kernel ZIP
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MerlinX-Kernel-6.12
          path: MerlinX-Kernel-6.12.zip
          retention-days: 30

      - name: Build Summary
        if: always()
        run: |
          if [ "${{ steps.build.outcome }}" == "success" ]; then
            echo "## ✅ Build Success" >> $GITHUB_STEP_SUMMARY
            echo "- **Kernel**: Linux 6.12 + MT6768/69 drivers" >> $GITHUB_STEP_SUMMARY
            echo "- **Device**: Redmi Note 9 (merlinx)" >> $GITHUB_STEP_SUMMARY
            echo "- **Format**: AnyKernel3 flashable ZIP for TWRP" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Build Failed" >> $GITHUB_STEP_SUMMARY
            echo "Check logs above." >> $GITHUB_STEP_SUMMARY
          fi
